<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToriloShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">ToriloShop</a>
        <div class="navbar-nav ms-3">
            <a class="nav-link px-2" href="/">Home</a>
            <a class="nav-link px-2" href="/products/">Products</a>
            <a class="nav-link px-2" href="/categories/">Categories</a>
            <a class="nav-link px-2" href="/about/">About</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- Flash Messages -->
    {% if messages %}
        <div class="alert-container">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}
    
    {% block content %}
    {% endblock %}
</div>

<footer class="bg-dark text-white text-center py-3 mt-5">
    <p>© 2026 ToriloShop. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
